<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨知 - 书法智能助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f5f0e8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        
        h1 {
            color: #2c1810;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #8b7355;
            margin-bottom: 40px;
        }
        
        .chat-container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
            padding: 30px;
        }
        
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0d5c5;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        input:focus {
            border-color: #8b6914;
        }
        
        button {
            padding: 12px 24px;
            background: #8b6914;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #6b5010;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        #answer {
            padding: 20px;
            background: #faf8f5;
            border-radius: 8px;
            min-height: 100px;
            line-height: 1.8;
            color: #333;
            white-space: pre-wrap;
        }
        
        .loading {
            color: #999;
            font-style: italic;
        }
        
        .error {
            color: #c0392b;
        }
    </style>
</head>
<body>
    <h1>🖌️ 墨知</h1>
    <p class="subtitle">书法智能助手</p>
    
    <div class="chat-container">
        <div class="input-area">
            <input 
                type="text" 
                id="question" 
                placeholder="请输入书法问题，如：颜真卿是谁？"
                onkeypress="if(event.key==='Enter')ask()"
            >
            <button id="submitBtn" onclick="ask()">提问</button>
        </div>
        <div id="answer">请输入问题，开始探索书法世界...</div>
    </div>

    <script>
        async function ask() {
            const input = document.getElementById('question');
            const btn = document.getElementById('submitBtn');
            const answer = document.getElementById('answer');
            
            const q = input.value.trim();
            if (!q) {
                answer.innerText = '请先输入问题';
                return;
            }
            
            btn.disabled = true;
            answer.innerText = '正在思考...';
            answer.className = 'loading';
            
            try {
                const res = await fetch(
                    `http://127.0.0.1:8000/chat?question=${encodeURIComponent(q)}`,
                    { method: 'POST' }
                );
                
                if (!res.ok) {
                    throw new Error('服务器响应错误：' + res.status);
                }
                
                const data = await res.json();
                answer.innerText = data.answer || '未收到回答';
                answer.className = '';
            } catch (err) {
                answer.innerText = '出错啦：' + err.message + '\n\n请确认：\n1. 后端服务已启动（python -m uvicorn backend.app.main:app --reload）\n2. Ollama 已运行（ollama run qwen2.5:3b）';
                answer.className = 'error';
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
